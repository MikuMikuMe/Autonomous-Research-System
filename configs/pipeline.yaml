# Config composition for Bias Audit Pipeline (agents, tools, envs, memory)
# Phase 4: Config-driven orchestration

pipeline:
  name: qmind-research
  version: "1.0"

  core_agents:
    - detection
    - mitigation
    - auditing

  research_agents:
    - agents.research_agent
    - agents.gap_check_agent
    - agents.coverage_agent
    - agents.topic_coverage_agent
    - agents.reproducibility_agent
    - agents.verification_agent
    - agents.optimizer_agent

  judge:
    agent: judge
    retry_hint_map:
      revise_claims: revision

  memory:
    persist_session: true
    persist_events_on_failure: true

  optimizer:
    run_after_research: true
    apply_proposals: false  # set true for auto-apply, or use --apply

research_loop:
  max_iterations: 10
  converge_threshold: 0.90   # fraction of claims verified to declare convergence
  evolve_every: 2            # run SEPL prompt evolution every N iterations
  compact_every: 3           # compact memory every N iterations
  flaw_halt_severity: critical  # severity that blocks convergence: critical|high|any|none
